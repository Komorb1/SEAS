name: CI

on:
  push:
  pull_request:

jobs:
  web_ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: grad_project_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/grad_project_test?schema=public
      JWT_SECRET: test_secret_ci
      NODE_ENV: test
      WEB_PUSH_VAPID_PUBLIC_KEY: test_public_key
      WEB_PUSH_VAPID_PRIVATE_KEY: test_private_key
      WEB_PUSH_VAPID_SUBJECT: mailto:test@example.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Run lint
        run: npm -w web run lint

      - name: Run tests
        run: npm -w web test

      - name: Build application
        run: npm -w web run build