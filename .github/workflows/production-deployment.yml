name: Production Deployment

on:
  push:
    branches:
      - main

permissions:
  contents: read
  deployments: write

jobs:
  production:
    name: Mark production deployment
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://seas-web.netlify.app

    steps:
      - name: Create deployment marker
        run: |
          echo "Production deployment recorded for ${GITHUB_SHA}"